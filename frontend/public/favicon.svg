<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cream background circle -->
  <circle cx="32" cy="32" r="31" fill="#FDFBF7" stroke="#2C1810" stroke-width="2"/>

  <!-- Ethiopian flag stripe arc (top) -->
  <path d="M 8 18 Q 32 4 56 18" fill="none" stroke="#078930" stroke-width="5"/>
  <path d="M 6 22 Q 32 8 58 22" fill="none" stroke="#FCDD09" stroke-width="3"/>
  <path d="M 5 26 Q 32 12 59 26" fill="none" stroke="#DA121A" stroke-width="2.5"/>

  <!-- Lalibela castle (simplified) -->
  <rect x="22" y="28" width="20" height="14" fill="#8B4513" rx="1"/>
  <rect x="26" y="24" width="12" height="8" fill="#A0522D" rx="1"/>
  <rect x="29" y="20" width="6" height="6" fill="#8B4513" rx="1"/>
  <!-- Cross on top -->
  <line x1="32" y1="16" x2="32" y2="20" stroke="#2C1810" stroke-width="1.5"/>
  <line x1="30" y1="17.5" x2="34" y2="17.5" stroke="#2C1810" stroke-width="1.5"/>

  <!-- "G-B" text -->
  <text x="32" y="50" text-anchor="middle" font-family="serif" font-weight="900"
        font-size="9" fill="#2C1810" letter-spacing="1">G-B</text>

  <!-- Tibeb border dots -->
  <circle cx="32" cy="60" r="1.5" fill="#F19A0E"/>
  <circle cx="24" cy="58" r="1" fill="#078930"/>
  <circle cx="40" cy="58" r="1" fill="#DA121A"/>

  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#F19A0E" stroke-width="1.5" stroke-dasharray="3 2"/>
</svg>
